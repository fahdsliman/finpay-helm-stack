{{- if .Values.txnProcessor.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-txn-processor
  labels:
    app: txn-processor
    release: {{ .Release.Name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-txn-processor
  minReplicas: {{ .Values.txnProcessor.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.txnProcessor.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.txnProcessor.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}