{{- if .Values.txnProcessor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-txn-processor
  labels:
    app: txn-processor
    release: {{ .Release.Name }}
    environment: {{ .Values.global.environment }}
spec:
  type: {{ .Values.txnProcessor.service.type }}
  ports:
    - port: {{ .Values.txnProcessor.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: txn-processor
    release: {{ .Release.Name }}
{{- end }}